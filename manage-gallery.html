    <header>
        <nav class="navbar">
            <div class="navbar-logo">
                <img src="Images/web-icon.png" alt="Malcolm's Logo">
            </div>
            <ul>
                <li><a href="admin.html">Admin Panel</a></li>
            </ul>
        </nav>
    </header>

    <main class="admin-page">
        <h1>Manage Gallery</h1>
        
        <section class="admin-section">
            <h2>Add Image</h2>
            <form action="upload.php" method="post" enctype="multipart/form-data">
        <input type="file" name="image" required>
        <select name="category" required>
            <option value="">Select Category</option>
            <option value="Scotland">Scotland</option>
            <option value="Wildlife">Wildlife</option>
            <option value="Coastal Birds">Coastal Birds</option>
            <option value="Weddings">Weddings</option>
            <option value="Parties">Parties</option>
            <option value="Functions">Functions</option>
            <option value="Birthdays">Birthdays</option>
            <option value="Portraits">Portraits</option>
        </select>
        <button type="submit" name="upload" value="Upload"> Upload </button>
    </form>



              <section class="admin-section">
    <h2>Update Photo</h2>
    <form action="update.php" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="action" value="update">
        <label for="id">Photo ID:</label>
        <input type="text" name="id" required><br><br>
        <label for="category">New Category:</label>
        <input type="text" name="category" required><br><br>
        <label for="image">Select New Image:</label>
        <input type="file" name="image" required><br><br>
        <button type="submit">Update Photo</button>
    </form>
</section>


        <section class="admin-section">
            <h2>Delete Photo</h2>
            <form action="delete.php" method="POST">
                <input type="hidden" name="action" value="delete">
                <label for="id">Photo ID:</label>
                <input type="text" name="id" required><br><br>
                <button type="submit">Delete Photo</button>
            </form>
        </section>
        <section class="admin-section">
            <h2>View All Photos</h2>
            <button onClick="location.href='gallery.php?action=view'">View Gallery</button>
        </section>
    </main>
