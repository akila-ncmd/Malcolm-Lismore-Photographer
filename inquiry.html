<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Inquiry Form</title>
    <link rel="stylesheet" href="inquiry.css">
</head>
<body>
    <div class="container">
        <header class="header">
         <a href="HomePage.php" class="back-btn">
    <span>Back</span></a><!-- Back button -->
          <h1>Inquiry Form</h1>
            <p>Please fill out the form below to make an inquiry.</p>
      </header>
      <form id="inquiryForm" action="submit_inquiry.php" method="POST">
            <div class="form-group">
                <label for="name">Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label for="conNo">Contact Number <span class="required">*</span></label>
                <input type="tel" id="conNo" name="conNo" placeholder="Enter your contact number" required>
            </div>
            <div class="form-group">
                <label for="email">Email <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required>
            </div>
            <div class="form-group">
                <label for="location">Location <span class="required">*</span></label>
                <input type="text" id="location" name="location" placeholder="Enter your location" required>
            </div>
            <div class="form-group">
                <label for="date">Date <span class="required">*</span></label>
                <input type="date" id="date" name="date" required>
            </div>
            <div class="form-group">
                <label for="msg">Message <span class="required">*</span></label>
              <textarea id="msg" name="msg" placeholder="Write your message here..." required></textarea>
            </div>            
        <button type="submit" onClick="location.href='inquiry.html">Submit Inquiry</button>
            
        </form>
    </div>
</body>
</html>
